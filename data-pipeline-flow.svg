<svg width="800" height="300" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <defs>
    <style>
      .pipeline-stage {
        fill: none;
        stroke: #00f0ff;
        stroke-width: 2;
        opacity: 0.8;
      }
      .stage-text {
        font-family: 'JetBrains Mono', 'Monaco', 'Menlo', monospace;
        font-size: 10px;
        fill: #a8a29e;
        text-anchor: middle;
      }
      .stage-title {
        font-size: 11px;
        fill: #fafaf9;
        font-weight: 600;
      }
      .data-flow {
        fill: #00f0ff;
        opacity: 0.6;
      }
      .flow-arrow {
        stroke: #00f0ff;
        stroke-width: 2;
        fill: none;
        marker-end: url(#arrowhead);
        animation: pulse 2s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.6; }
        50% { opacity: 1; }
      }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" 
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00f0ff"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="300" fill="#0c0a09"/>
  
  <!-- Pipeline Stages -->
  <!-- Data Sources -->
  <rect x="50" y="100" width="80" height="100" rx="10" class="pipeline-stage"/>
  <text x="90" y="125" class="stage-text stage-title">DATA</text>
  <text x="90" y="140" class="stage-text stage-title">SOURCES</text>
  <text x="90" y="162" class="stage-text">APIs</text>
  <text x="90" y="178" class="stage-text">Databases</text>
  
  <!-- Ingestion -->
  <rect x="180" y="100" width="80" height="100" rx="10" class="pipeline-stage"/>
  <text x="220" y="125" class="stage-text stage-title">INGESTION</text>
  <text x="220" y="150" class="stage-text">Airflow</text>
  <text x="220" y="166" class="stage-text">Kafka</text>
  <text x="220" y="182" class="stage-text">Spark Stream</text>
  
  <!-- Processing -->
  <rect x="310" y="100" width="80" height="100" rx="10" class="pipeline-stage"/>
  <text x="350" y="125" class="stage-text stage-title">PROCESSING</text>
  <text x="350" y="150" class="stage-text">Apache Spark</text>
  <text x="350" y="166" class="stage-text">Python</text>
  <text x="350" y="182" class="stage-text">Databricks</text>
  
  <!-- Storage -->
  <rect x="440" y="100" width="80" height="100" rx="10" class="pipeline-stage"/>
  <text x="480" y="125" class="stage-text stage-title">STORAGE</text>
  <text x="480" y="150" class="stage-text">Snowflake</text>
  <text x="480" y="166" class="stage-text">PostgreSQL</text>
  <text x="480" y="182" class="stage-text">Iceberg</text>
  
  <!-- ML & Analytics -->
  <rect x="560" y="100" width="90" height="100" rx="10" class="pipeline-stage"/>
  <text x="605" y="125" class="stage-text stage-title">ML &amp; ANALYTICS</text>
  <text x="605" y="150" class="stage-text">TensorFlow</text>
  <text x="605" y="166" class="stage-text">PyTorch</text>
  <text x="605" y="182" class="stage-text">Pinecone</text>
  
  <!-- Deployment -->
  <rect x="690" y="100" width="80" height="100" rx="10" class="pipeline-stage"/>
  <text x="730" y="125" class="stage-text stage-title">DEPLOY</text>
  <text x="730" y="150" class="stage-text">Docker</text>
  <text x="730" y="166" class="stage-text">Terraform</text>
  <text x="730" y="182" class="stage-text">Cloud</text>
  
  <!-- Flow Arrows -->
  <path d="M 130 150 L 180 150" class="flow-arrow"/>
  <path d="M 260 150 L 310 150" class="flow-arrow"/>
  <path d="M 390 150 L 440 150" class="flow-arrow"/>
  <path d="M 520 150 L 560 150" class="flow-arrow"/>
  <path d="M 650 150 L 690 150" class="flow-arrow"/>
  
  <!-- Animated Data Flow Particles -->
  <circle cx="150" cy="150" r="3" class="data-flow">
    <animateTransform attributeName="transform" type="translate" 
                      from="130"
                      to="180" 
                      dur="3s" repeatCount="indefinite"/>
  </circle>

  <circle cx="150" cy="150" r="3" fill="#00f0ff">
    <animateTransform attributeName="transform" type="translate" 
                      from="110"
                      to="160" 
                      begin="1s" dur="4s" repeatCount="indefinite"/>
  </circle>

  <circle cx="150" cy="150" r="3" fill="#00f0ff">
    <animateTransform attributeName="transform" type="translate" 
                      from="240"
                      to="290" 
                      begin="2s" dur="5s" repeatCount="indefinite"/>
  </circle>

  <circle cx="150" cy="150" r="3" fill="#00f0ff">
    <animateTransform attributeName="transform" type="translate" 
                      from="370"
                      to="410" 
                      begin="3s" dur="6s" repeatCount="indefinite"/>
  </circle>

  <circle cx="150" cy="150" r="3" fill="#00f0ff">
    <animateTransform attributeName="transform" type="translate" 
                      from="500"
                      to="540" 
                      begin="4s" dur="7s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Cloud Infrastructure Layer -->
  <text x="400" y="50" class="stage-text" style="font-size: 13px; fill: #78716c;">
    AWS • GCP • Cloudflare • Edge Computing
  </text>
  
  <!-- Title -->
  <text x="400" y="280" class="stage-text" style="font-size: 16px; fill: #00f0ff; font-weight: 700;">
    Data Engineering Pipeline
  </text>
</svg>
