<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <style>
      .constellation-line {
        stroke: #78716c;
        stroke-width: 1;
        opacity: 0.3;
        animation: pulse 3s ease-in-out infinite;
      }
      .tech-node {
        fill: #0c0a09;
        stroke: #00f0ff;
        stroke-width: 2;
        animation: glow 2s ease-in-out infinite alternate;
      }
      .tech-text {
        font-family: 'JetBrains Mono', 'Monaco', 'Menlo', monospace;
        font-size: 11px;
        fill: #fafaf9;
        text-anchor: middle;
        dominant-baseline: central;
      }
      .primary-node {
        fill: #00f0ff;
        animation: mainGlow 2s ease-in-out infinite alternate;
      }
      .primary-text {
        fill: #0c0a09;
        font-weight: 700;
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 0.8; }
      }
      @keyframes glow {
        0% { filter: drop-shadow(0 0 5px #00f0ff); }
        100% { filter: drop-shadow(0 0 15px #00f0ff); }
      }
      @keyframes mainGlow {
        0% { filter: drop-shadow(0 0 10px #00f0ff); }
        100% { filter: drop-shadow(0 0 25px #00f0ff); }
      }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="400" fill="#0c0a09"/>
  
  <!-- Constellation Lines -->
  <line x1="400" y1="200" x2="200" y2="100" class="constellation-line"/>
  <line x1="400" y1="200" x2="600" y2="100" class="constellation-line"/>
  <line x1="400" y1="200" x2="150" y2="250" class="constellation-line"/>
  <line x1="400" y1="200" x2="650" y2="250" class="constellation-line"/>
  <line x1="400" y1="200" x2="300" y2="320" class="constellation-line"/>
  <line x1="400" y1="200" x2="500" y2="320" class="constellation-line"/>
  <line x1="200" y1="100" x2="150" y2="250" class="constellation-line"/>
  <line x1="600" y1="100" x2="650" y2="250" class="constellation-line"/>
  <line x1="300" y1="320" x2="500" y2="320" class="constellation-line"/>
  
  <!-- Central Node - Data Engineering -->
  <circle cx="400" cy="200" r="42" class="tech-node primary-node"/>
  <text x="400" y="192" class="tech-text primary-text">DATA</text>
  <text x="400" y="208" class="tech-text primary-text">ENGINEERING</text>
  
  <!-- Tech Stack Nodes -->
  <circle cx="200" cy="100" r="20" class="tech-node"/>
  <text x="200" y="100" class="tech-text">GCP</text>
  
  <circle cx="600" cy="100" r="28" class="tech-node"/>
  <text x="600" y="100" class="tech-text">AWS</text>
  
  <circle cx="150" cy="250" r="32" class="tech-node"/>
  <text x="150" y="250" class="tech-text">Python</text>
  
  <circle cx="650" cy="250" r="22" class="tech-node"/>
  <text x="650" y="250" class="tech-text">Spark</text>
  
  <circle cx="300" cy="320" r="26" class="tech-node"/>
  <text x="300" y="320" class="tech-text">ML / AI</text>
  
  <circle cx="500" cy="320" r="24" class="tech-node"/>
  <text x="500" y="320" class="tech-text">Docker</text>
  
  <!-- Additional smaller nodes -->
  <circle cx="100" cy="150" r="22" class="tech-node"/>
  <text x="100" y="150" class="tech-text">SQL</text>
  
  <circle cx="700" cy="150" r="26" class="tech-node"/>
  <text x="700" y="142" class="tech-text">Snow</text>
  <text x="700" y="158" class="tech-text">flake</text>
  
  <!-- Connecting lines for smaller nodes -->
  <line x1="200" y1="100" x2="100" y2="150" class="constellation-line"/>
  <line x1="600" y1="100" x2="700" y2="150" class="constellation-line"/>
</svg>
